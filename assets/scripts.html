<script>
document.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById("profile-links-dynamic");
  if (!container) return;

  const dataset = container.dataset;

  const items = [
    { key: "cv",            icon: "bi bi-file-earmark-text", label: "View CV",             base: "" },
    { key: "website-external",       icon: "bi bi-globe",             label: "Website",         base: "" },
    { key: "googleScholar", icon: "bi bi-mortarboard",       label: "Google Scholar",  base: "" },
    { key: "researchgate",  icon: "ai ai-researchgate",      label: "ResearchGate",    base: "https://www.researchgate.net/profile/" },
    { key: "github",        icon: "bi bi-github",            label: "GitHub",          base: "https://github.com/" },
    { key: "linkedin",      icon: "bi bi-linkedin",          label: "LinkedIn",        base: "https://linkedin.com/in/" },
    { key: "bluesky",       icon: "bi bi-cloud",             label: "Bluesky",         base: "https://bsky.app/profile/" },
    { key: "x",             icon: "bi bi-twitter-x",         label: "X.com",               base: "https://x.com/" },
  ];

  items.forEach(({ key, icon, label, base }) => {
    const val = dataset[key]?.trim();
    if (!val || val === "" || val.startsWith("{{")) return;

    const a = document.createElement("a");
    a.href = base + val;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.innerHTML = `<i class="${icon}"></i> ${label}`;
    container.appendChild(a);
  });
});
</script>


<script>
function copyEmail(link) {
  const email = link.dataset.copy;
  const icon = link.querySelector('i');
  navigator.clipboard.writeText(email).then(() => {
    const originalClass = icon.className;
    icon.className = 'bi bi-check2';

    const confirmSpan = document.createElement('span');
    confirmSpan.className = 'copy-confirm';
    confirmSpan.textContent = '';
    icon.after(confirmSpan);

    setTimeout(() => {
      icon.className = originalClass;
      confirmSpan.remove();
    }, 1500);
  });
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const filterBars = document.querySelectorAll(".pub-filter-bar");

  filterBars.forEach((bar) => {
    const buttons = bar.querySelectorAll(".pill-filter");
    const targetSelector = bar.dataset.target || ".publications-list";
    const filterBy = bar.dataset.filterBy || "pub-type";
    const list = document.querySelector(targetSelector);
    if (!list || !buttons.length) return;

    const datasetKey = filterBy.replace(/-([a-z])/g, (_, c) => c.toUpperCase());

    function itemMatches(el, filter) {
      if (filter === "all") return true;
      const raw = (el.dataset[datasetKey] || "").trim();
      if (!raw) return false;

      // If the value contains commas, treat as multi-valued; otherwise exact match
      if (raw.includes(",")) {
        const values = raw.split(",").map((v) => v.trim()).filter(Boolean);
        return values.includes(filter);
      }
      return raw === filter;
    }

    function applyFilter(filter) {
      const entries = list.querySelectorAll(".publication-entry, .listing-card");
      entries.forEach((el) => {
        el.style.display = itemMatches(el, filter) ? "" : "none";
      });

      const yearGroups = list.querySelectorAll(".publication-year-group");
      yearGroups.forEach((group) => {
        let next = group.nextElementSibling;
        let hasVisibleEntries = false;
        while (next && !next.classList.contains("publication-year-group")) {
          if (
            next.classList.contains("publication-entry") &&
            next.style.display !== "none"
          ) {
            hasVisibleEntries = true;
            break;
          }
          next = next.nextElementSibling;
        }
        group.style.display = hasVisibleEntries ? "" : "none";
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", function () {
        const filter = this.dataset.filter;
        buttons.forEach((btn) => btn.classList.remove("active"));
        this.classList.add("active");
        applyFilter(filter);
      });
    });

    applyFilter("all");
  });
});
</script>

<script>
(function() {
  function updateActiveNav() {
    document.querySelectorAll('.navbar .nav-link').forEach(link => {
      try {
        const linkPath = new URL(link.href).pathname.replace(/\/$/, '');
        const currentPath = window.location.pathname.replace(/\/$/, '');
        if (linkPath && (currentPath === linkPath || currentPath.startsWith(linkPath + '/'))) {
          link.classList.add('active');
        }
      } catch (e) {}
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', updateActiveNav);
  } else {
    updateActiveNav();
  }
  // Run again after a beat in case Quarto/Bootstrap rewrites classes
  setTimeout(updateActiveNav, 100);
})();
</script>

<script>
  (function initScrollNavs() {
    const components = document.querySelectorAll('.listing-scroll-component');

    components.forEach((root) => {
      const row = root.querySelector('.listing-scroll-row');
      const fill = root.querySelector('.scroll-nav__fill');
      const track = root.querySelector('.scroll-nav__track');
      const prevBtn = root.querySelector('.scroll-nav__prev');
      const nextBtn = root.querySelector('.scroll-nav__next');

      if (!row || !fill || !prevBtn || !nextBtn) return;

      const cards = Array.from(row.children);
      if (cards.length === 0) return;

      let activeIdx = 0;

      function scrollToCard(idx) {
        const target = cards[idx];
        if (!target) return;
        const padLeft = parseFloat(getComputedStyle(row).paddingLeft) || 0;
        row.scrollTo({
          left: target.offsetLeft - padLeft,
          behavior: 'smooth',
        });
      }

      function update() {
        const padLeft = parseFloat(getComputedStyle(row).paddingLeft) || 0;
        const anchor = row.scrollLeft + padLeft;

        let bestIdx = 0;
        let bestDist = Infinity;
        cards.forEach((card, i) => {
          const dist = Math.abs(card.offsetLeft - anchor);
          if (dist < bestDist) {
            bestDist = dist;
            bestIdx = i;
          }
        });

        activeIdx = bestIdx;

        const max = row.scrollWidth - row.clientWidth;
        const ratio = max > 0 ? Math.min(1, Math.max(0, row.scrollLeft / max)) : 0;
        const pct = Math.max(4, ratio * 100);
        fill.style.width = pct + '%';

        prevBtn.disabled = activeIdx === 0;
        nextBtn.disabled = activeIdx >= cards.length - 1;
      }

      function getStep() {
  // Scroll by one card width + gap, so each click reveals one new card
  const card = cards[0];
  const gap = parseFloat(getComputedStyle(row).columnGap || getComputedStyle(row).gap) || 0;
  return (card?.offsetWidth || 360) + gap;
}

  prevBtn.addEventListener('click', () => {
    row.scrollBy({ left: -getStep(), behavior: 'smooth' });
  });
  nextBtn.addEventListener('click', () => {
    row.scrollBy({ left: getStep(), behavior: 'smooth' });
  });

      track.addEventListener('click', (e) => {
        const rect = track.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        const max = row.scrollWidth - row.clientWidth;
        row.scrollTo({ left: ratio * max, behavior: 'smooth' });
      });

      let scrollRaf = null;
      row.addEventListener('scroll', () => {
        if (scrollRaf) return;
        scrollRaf = requestAnimationFrame(() => {
          update();
          scrollRaf = null;
        });
      });
      window.addEventListener('resize', update);

      update();
    });
  })();
</script>
