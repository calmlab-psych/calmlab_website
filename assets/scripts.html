<script src="/assets/listings/listing-filters.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById("profile-links-dynamic");
  if (!container) return;

  const dataset = container.dataset;

  const items = [
    { key: "cv",            icon: "bi bi-file-earmark-text", label: "CV",             base: "" },
    { key: "website",       icon: "bi bi-globe",             label: "Website",         base: "" },
    { key: "googleScholar", icon: "bi bi-mortarboard",       label: "Google Scholar",  base: "" },
    { key: "linkedin",      icon: "bi bi-linkedin",          label: "LinkedIn",        base: "https://linkedin.com/in/" },
    { key: "bluesky",       icon: "bi bi-cloud",             label: "Bluesky",         base: "https://bsky.app/profile/" },
    { key: "researchgate",  icon: "ai ai-researchgate",      label: "ResearchGate",    base: "https://www.researchgate.net/profile/" },
    { key: "x",             icon: "bi bi-twitter-x",         label: "X.com",               base: "https://x.com/" },
    { key: "github",        icon: "bi bi-github",            label: "GitHub",          base: "https://github.com/" },
  ];

  items.forEach(({ key, icon, label, base }) => {
    const val = dataset[key]?.trim();
    if (!val || val.startsWith("{{")) return;

    const a = document.createElement("a");
    a.href = base + val;
    a.innerHTML = `<i class="${icon}"></i> ${label}`;
    container.appendChild(a);
  });
});
</script>


<script>
function copyEmail(link) {
  const email = link.dataset.copy;
  const icon = link.querySelector('i');
  navigator.clipboard.writeText(email).then(() => {
    icon.classList.remove('bi-copy');
    icon.classList.add('bi-check2');
    setTimeout(() => {
      icon.classList.remove('bi-check2');
      icon.classList.add('bi-copy');
    }, 1500);
  });
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const filterBars = document.querySelectorAll(".pub-filter-bar");

  filterBars.forEach((bar) => {
    const buttons = bar.querySelectorAll(".pill-filter");
    const targetSelector = bar.dataset.target || ".publications-list";
    const filterBy = bar.dataset.filterBy || "pub-type";
    const list = document.querySelector(targetSelector);
    if (!list || !buttons.length) return;

    const datasetKey = filterBy.replace(/-([a-z])/g, (_, c) => c.toUpperCase());

    function itemMatches(el, filter) {
      if (filter === "all") return true;
      const raw = (el.dataset[datasetKey] || "").trim();
      if (!raw) return false;

      // If the value contains commas, treat as multi-valued; otherwise exact match
      if (raw.includes(",")) {
        const values = raw.split(",").map((v) => v.trim()).filter(Boolean);
        return values.includes(filter);
      }
      return raw === filter;
    }

    function applyFilter(filter) {
      const entries = list.querySelectorAll(".publication-entry, .listing-card");
      entries.forEach((el) => {
        el.style.display = itemMatches(el, filter) ? "" : "none";
      });

      const yearGroups = list.querySelectorAll(".publication-year-group");
      yearGroups.forEach((group) => {
        let next = group.nextElementSibling;
        let hasVisibleEntries = false;
        while (next && !next.classList.contains("publication-year-group")) {
          if (
            next.classList.contains("publication-entry") &&
            next.style.display !== "none"
          ) {
            hasVisibleEntries = true;
            break;
          }
          next = next.nextElementSibling;
        }
        group.style.display = hasVisibleEntries ? "" : "none";
      });
    }

    buttons.forEach((button) => {
      button.addEventListener("click", function () {
        const filter = this.dataset.filter;
        buttons.forEach((btn) => btn.classList.remove("active"));
        this.classList.add("active");
        applyFilter(filter);
      });
    });

    applyFilter("all");
  });
});
</script>
